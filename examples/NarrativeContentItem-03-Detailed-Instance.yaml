id: NCI-ST-ANALYSIS-004
name: Primary Endpoint Statistical Method
text: 'The primary analysis will be performed on the  <usdm:ref klass=AnalysisPopulation
  id=AP-1 attribute=name/>  set. The <usdm:ref klass=Endpoint id=EP-001 attribute=label/>  will
  be analyzed using a Mixed Model for Repeated Measures (MMRM).  Missing data for
  the <usdm:ref klass=Variable id=VAR-FEV1 attribute=name/>  will be handled according
  to the strategy defined in the  <usdm:ref klass=Estimand id=EST-1 attribute=name/>.

  '
extensionAttributes:
  - id: EXT-NCI-ST-01
    url: https://example.org/usdm/extensions/statistical-software
    valueString: SAS Version 9.4
  - id: EXT-NCI-ST-02
    url: https://example.org/usdm/extensions/is-primary-analysis
    valueBoolean: true
