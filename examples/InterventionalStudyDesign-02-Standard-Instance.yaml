id: ISD-2
name: Double-blind Crossover Study Design
label: Crossover ISD
description: A 2-period, 2-sequence crossover study comparing New Drug X to Placebo.
rationale: To evaluate efficacy while allowing each subject to serve as their own
  control.
model:
