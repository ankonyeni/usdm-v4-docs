changes:
  - id: StudyChange_9
    name: AMEND_CHG_9
    rationale: Clarification of sample size.
    summary: The number of participants changed from “up to 10” to “approximately
      10”.
    changedSections:
      - id: DocumentContentReference_11
        sectionNumber: '1.1'
        sectionTitle: Synopsis
        appliesToId: StudyDefinitionDocument_1
      - id: DocumentContentReference_12
        sectionNumber: '9.2'
        sectionTitle: Sample Size Determination
        appliesToId: StudyDefinitionDocument_1
  - id: StudyChange_10
    name: AMEND_CHG_10
    rationale: Site processes does not allow use of paper diary.
    summary: SMS text messaging will replace the dosing diary as the method of confirming
      treatment compliance during the outpatient period.
    changedSections:
      - id: DocumentContentReference_13
        sectionNumber: '1.1'
        sectionTitle: Synopsis
        appliesToId: StudyDefinitionDocument_1
      - id: DocumentContentReference_14
        sectionNumber: '1.2'
        sectionTitle: Schema
        appliesToId: StudyDefinitionDocument_1
      - id: DocumentContentReference_15
        sectionNumber: '1.3'
        sectionTitle: Schedule of Activities
        appliesToId: StudyDefinitionDocument_1
      - id: DocumentContentReference_16
        sectionNumber: '4.1'
        sectionTitle: Overall Design
        appliesToId: StudyDefinitionDocument_1
      - id: DocumentContentReference_17
        sectionNumber: '6.4'
        sectionTitle: Study Intervention Compliance
        appliesToId: StudyDefinitionDocument_1
  - id: StudyChange_11
    name: AMEND_CHG_11
    rationale: COVID-19 vaccination guidance added.
    summary: To provide guidance on potential risks identified and mitigation measures
      put in place regarding the COVID-19 vaccination rollout.
    changedSections:
      - id: DocumentContentReference_18
        sectionNumber: 2.3.1.1
        sectionTitle: Coronavirus Disease 2019
        appliesToId: StudyDefinitionDocument_1
      - id: DocumentContentReference_19
        sectionNumber: '10.5'
        sectionTitle: COVID-19 Vaccine Risk Assessment
        appliesToId: StudyDefinitionDocument_1
  - id: StudyChange_12
    name: AMEND_CHG_12
    rationale: Inclusion criterion for confirmation of diagnosis of WD changed to
      Leipzig score ≥ 4 and expanded to include historical test results.
    summary: To clarify the process for confirming the score for patients who were
      diagnosed prior to the establishment of the 2012 European Association for the
      Study of Liver WD Clinical Practice Guidelines.
    changedSections:
      - id: DocumentContentReference_20
        sectionNumber: '5.1'
        sectionTitle: Inclusion criteria
        appliesToId: StudyDefinitionDocument_1
  - id: StudyChange_13
    name: AMEND_CHG_13
    rationale: '<ul>

      <li>To align with other ALXN1840 Phase 2 and Phase 3 study protocols which did
      not reference this criterion</li>

      <li>Recreational use of cannabis use is being decriminalized in many countries</li>

      <li>Medicinal use of cannabis would potentially relieve symptoms of WD</li>

      <li>Recent use of cannabis is not expected to alter copper or molybdenum balance</li>

      </ul>'
    summary: Exclusion criterion for drug screen revised to state that cannabinoids
      will not be tested.
    changedSections:
      - id: DocumentContentReference_21
        sectionNumber: '5.2'
        sectionTitle: Exclusion criteria
        appliesToId: StudyDefinitionDocument_1
  - id: StudyChange_14
    name: AMEND_CHG_14
    rationale: For consistency across all ALXN1840 protocols.
    summary: Exclusion criterion 11 revised to “The use of an experimental or unapproved/unlicensed
      therapy at the same time or within 90 days or 5 half-lives, whichever is longer,
      prior to the Screening Visit.”
    changedSections:
      - id: DocumentContentReference_22
        sectionNumber: '5.2'
        sectionTitle: Exclusion criteria
        appliesToId: StudyDefinitionDocument_1
  - id: StudyChange_15
    name: AMEND_CHG_15
    rationale: To align with UK legislation
    summary: 'Added: “The Investigator will notify the IRB/IEC of deviations from
      the study protocol or GCP as defined by UK legislation as a serious breach or
      as required by IRB/IEC procedures.”'
    changedSections:
      - id: DocumentContentReference_23
        sectionNumber: 10.1.1
        sectionTitle: Regulatory and Ethical Considerations
        appliesToId: StudyDefinitionDocument_1
