        range: BiomedicalConceptCategory
        required: false
        multivalued: true
        inlined: false
      extensionAttributes:
        range: ExtensionAttribute
        required: false
        multivalued: true
        inlined: true
  BiomedicalConceptProperty:
    title: Biomedical Concept Property
    description: A characteristic from a set of characteristics used to define a biomedical
