        range: Code
        required: false
        multivalued: true
        inlined: true
        exact_mappings:
        - ncit:C215529
      extensionAttributes:
        range: ExtensionAttribute
        required: false
        multivalued: true
        inlined: true
  AnalysisPopulation:
    title: Analysis Population
    description: A target study population on which an analysis is performed. These
      may be represented by the entire study population, a subgroup defined by a particular
      characteristic measured at baseline, or a principal stratum defined by the occurrence
      (or non-occurrence, depending on context) of a specific intercurrent event.
      (ICH E9 R1 Addendum)
    class_uri: usdm:AnalysisPopulation
    exact_mappings:
    - ncit:C188814
    attributes:
      id:
        range: string
        required: true
        multivalued: false
        identifier: true
      text:
        title: Analysis Population Text
        description: An instance of unstructured text that represents the analysis
          population.
        range: string
        required: true
        multivalued: false
        exact_mappings:
        - ncit:C207468
      name:
        title: Analysis Population Name
        description: The literal identifier (i.e., distinctive designation) of the
          analysis population.
        range: string
        required: true
        multivalued: false
        exact_mappings:
        - ncit:C207467
      label:
        title: Analysis Population Label
        description: The short descriptive designation for the analysis population.
        range: string
        required: false
        multivalued: false
        exact_mappings:
        - ncit:C207466
      description:
        title: Analysis Population Description
        description: A narrative representation of the analysis population.
        range: string
        required: false
        multivalued: false
        exact_mappings:
        - ncit:C188854
      notes:
        title: Analysis Population Notes
        description: A brief written record relevant to the analysis population.
        range: CommentAnnotation
        required: false
        multivalued: true
        inlined: true
        exact_mappings:
        - ncit:C215525
      subsetOfIds:
        description: A USDM relationship between the AnalysisPopulation and PopulationDefinition
          classes which identifies the population definition of which the analysis
          population is a subset.
        range: PopulationDefinition
        required: false
        multivalued: true
        inlined: false
      extensionAttributes:
        range: ExtensionAttribute
        required: false
        multivalued: true
        inlined: true
  AssignedPerson:
    title: Assigned Person
    description: An individual person who is allotted or appointed to a particular
      role, function, or other entity.
    class_uri: usdm:AssignedPerson
    exact_mappings:
    - ncit:C215496
    attributes:
      id:
        range: string
        required: true
        multivalued: false
        identifier: true
      name:
        title: Assigned Person Name
        description: The literal identifier (i.e., distinctive designation) of the
