id: https://example.org/usdm/v4/linkml
name: usdm_v4
title: USDM v4 LinkML
description: LinkML representation generated from the CDISC DDF-RA USDM v4 dataStructure.yml
  model.
default_prefix: usdm
default_range: string
imports:
- linkml:types
prefixes:
  linkml: https://w3id.org/linkml/
  usdm: https://example.org/usdm/v4/
  ncit: http://purl.obolibrary.org/obo/NCIT_
annotations:
  source_repository: https://github.com/cdisc-org/DDF-RA
  source_release: v4.0.0
  source_model_path: Deliverables/UML/dataStructure.yml
classes:
  Abbreviation:
    title: Abbreviation
    description: A set of letters that are drawn from a word or from a sequence of
      words and that are used for brevity in place of the full word or phrase. (CDISC
      Glossary)
    class_uri: usdm:Abbreviation
    exact_mappings:
    - ncit:C42610
    attributes:
      id:
        range: string
        required: true
        multivalued: false
        identifier: true
      abbreviatedText:
        title: Text Abbreviation Value
        description: The literal value of an instance of unstructured text that is
          used as the abbreviation.
        range: string
        required: true
        multivalued: false
        exact_mappings:
        - ncit:C215487
      expandedText:
        title: Abbreviation Long Name
        description: The full literal representation of the abbreviation.
        range: string
        required: true
        multivalued: false
        exact_mappings:
        - ncit:C215569
      notes:
        title: Abbreviation Notes
        description: A brief written record relevant to the abbreviation.
        range: CommentAnnotation
        required: false
        multivalued: true
        inlined: true
        exact_mappings:
        - ncit:C215570
      extensionAttributes:
        range: ExtensionAttribute
        required: false
        multivalued: true
        inlined: true
  Activity:
    title: Study Activity
    description: An action, undertaking, or event, which is anticipated to be performed
      or observed, or was performed or observed, according to the study protocol during
      the execution of the study.
    class_uri: usdm:Activity
    exact_mappings:
    - ncit:C71473
    attributes:
      id:
        range: string
        required: true
        multivalued: false
        identifier: true
      name:
        title: Study Activity Name
        description: The literal identifier (i.e., distinctive designation) of the
          study activity.
        range: string
        required: true
        multivalued: false
        exact_mappings:
        - ncit:C188842
      label:
        title: Study Activity Label
        description: The short descriptive designation for the study activity.
        range: string
        required: false
        multivalued: false
        exact_mappings:
        - ncit:C207458
      description:
        title: Study Activity Description
        description: A narrative representation of the study activity.
        range: string
        required: false
        multivalued: false
        exact_mappings:
        - ncit:C70960
      notes:
        title: Activity Notes
        description: A brief written record relevant to the activity.
        range: CommentAnnotation
        required: false
        multivalued: true
        inlined: true
        exact_mappings:
        - ncit:C215519
      definedProcedures:
        description: A USDM relationship between the Activity and Procedure classes
          which identifies the set of defined procedures associated with the activity.
        range: Procedure
        required: false
        multivalued: true
        inlined: true
      biomedicalConceptIds:
        description: A USDM relationship between the Activity and BiomedicalConcept
          classes which identifies the set of biomedical concepts associated with
          the activity.
        range: BiomedicalConcept
        required: false
        multivalued: true
        inlined: false
      nextId:
        description: A USDM relationship within the Activity class which identifies
          the activity that follows the current activity in the display order.
        range: Activity
        required: false
        multivalued: false
        inlined: false
      timelineId:
        description: A USDM relationship between the Activity and ScheduleTimeline
          classes which provides the details associated with an instance of the scheduled
          timeline related to the activity.
        range: ScheduleTimeline
        required: false
        multivalued: false
        inlined: false
      childIds:
        description: A USDM relationship within the Activity class which identifies
          the set of child activities associated with an activity.
        range: Activity
        required: false
        multivalued: true
        inlined: false
      previousId:
        description: A USDM relationship within the Activity class which identifies
          the activity that precedes the current activity in the display order.
        range: Activity
        required: false
        multivalued: false
        inlined: false
      bcSurrogateIds:
        description: A USDM relationship between the Activity and BiomedicalConceptSurrogate
          classes which identifies the set of biomedical concept surrogates associated
          with the activity.
        range: BiomedicalConceptSurrogate
        required: false
        multivalued: true
        inlined: false
      bcCategoryIds:
        description: A USDM relationship between the Activity and BiomedicalConceptCategory
          classes which identifies the set of biomedical concept categories associated
          with the activity.
        range: BiomedicalConceptCategory
        required: false
        multivalued: true
        inlined: false
      extensionAttributes:
        range: ExtensionAttribute
        required: false
        multivalued: true
        inlined: true
  Address:
    title: Address
    description: A standardized representation of the location of a person, business,
      building, or organization. (NCI)
    class_uri: usdm:Address
    exact_mappings:
    - ncit:C25407
    attributes:
      id:
        range: string
        required: true
        multivalued: false
        identifier: true
      text:
        title: Address Full Text
        description: A standardized representation of the complete set of components
          denoting the physical address of the person, business, building, or organization.
        range: string
        required: false
        multivalued: false
        exact_mappings:
        - ncit:C201311
      lines:
        title: Address Line
        description: The street name and number, building number, apartment or unit
          number, or post office box number where an entity is physically located.
        range: string
        required: false
        multivalued: true
        exact_mappings:
        - ncit:C25690
      district:
        title: District
        description: An administrative or territorial division of a city, town, county,
          parish, state, country, or other locality based on a shared characteristic.
        range: string
        required: false
        multivalued: false
        exact_mappings:
        - ncit:C176229
      city:
        title: City
        description: A relatively large and/or densely populated area of human habitation
          with administrative or legal status that may be specified as a component
          of a postal address.
        range: string
        required: false
        multivalued: false
        exact_mappings:
        - ncit:C25160
      postalCode:
        title: Postal Code
        description: An alphanumeric code assigned to a mail delivery area.
        range: string
        required: false
        multivalued: false
        exact_mappings:
        - ncit:C25621
      state:
        title: State
        description: A sub-division of a country that forms part of a federal union.
          States are usually, but not always, more autonomous than provinces and may
          have different laws from the central government.
        range: string
        required: false
        multivalued: false
        exact_mappings:
        - ncit:C87194
      country:
        title: Country
        description: A sovereign nation occupying a distinct territory and ruled by
          an autonomous government.
        range: Code
        required: false
        multivalued: false
        inlined: true
        exact_mappings:
        - ncit:C25464
      extensionAttributes:
        range: ExtensionAttribute
        required: false
        multivalued: true
        inlined: true
  AdministrableProduct:
    title: Administrable Product
    description: Any study product that is formulated and presented in the form that
      is suitable for administration to a study participant.
    class_uri: usdm:AdministrableProduct
    exact_mappings:
    - ncit:C215492
    attributes:
      id:
        range: string
        required: true
        multivalued: false
        identifier: true
      name:
        title: Administrable Product Definition Name
        description: The literal identifier (i.e., distinctive designation) of the
          administrable product.
        range: string
        required: true
        multivalued: false
        exact_mappings:
        - ncit:C215573
      label:
        title: Administrable Product Definition Label
        description: The short descriptive designation for the administrable product.
        range: string
        required: false
        multivalued: false
        exact_mappings:
        - ncit:C215575
      description:
        title: Administrable Product Definition Description
        description: A narrative representation of the administrable product.
        range: string
        required: false
        multivalued: false
        exact_mappings:
        - ncit:C215574
      administrableDoseForm:
        title: Administrable Product Dose Form
        description: The physical form in which formulated ingredient(s) are presented
          in the administrable product.
        range: AliasCode
        required: true
        multivalued: false
        inlined: true
        exact_mappings:
        - ncit:C215576
      sourcing:
        title: Administrable Product Sourcing
        description: An indication as to whether the administrable product is obtained
          from a local or central source.
        range: Code
        required: false
        multivalued: false
        inlined: true
        exact_mappings:
        - ncit:C215578
      productDesignation:
        title: Administrable Product Product Designation
        description: An indication as to whether the administrable product is an investigational
          medicinal product or an auxiliary medicinal product.
        range: Code
        required: true
        multivalued: false
        inlined: true
        exact_mappings:
        - ncit:C215579
      pharmacologicClass:
        title: Administrable Product Pharmacologic Class
        description: The pharmacological class of the administrable product.
        range: Code
        required: false
        multivalued: false
        inlined: true
        exact_mappings:
        - ncit:C215577
      notes:
        title: Administrable Product Notes
        description: A brief written record relevant to the administrable product.
        range: CommentAnnotation
        required: false
        multivalued: true
        inlined: true
        exact_mappings:
        - ncit:C215580
      identifiers:
        description: A USDM relationship between the AdministrableProduct and AdministrableProductIdentifier
          classes which provides the set of identifiers related to the administrable
          product.
        range: AdministrableProductIdentifier
        required: false
        multivalued: true
        inlined: true
      properties:
        description: A USDM relationship between the AdministrableProduct and AdministrableProductProperty
          classes which provides the set of properties related to the administrable
          product.
        range: AdministrableProductProperty
        required: false
        multivalued: true
        inlined: true
      ingredients:
        description: A USDM relationship between the AdministrableProduct and Ingredient
          classes which provides the set of ingredients related to the administrable
          product.
        range: Ingredient
        required: false
        multivalued: true
        inlined: true
      extensionAttributes:
        range: ExtensionAttribute
        required: false
        multivalued: true
        inlined: true
  AdministrableProductIdentifier:
    title: Administrable Product Identifier
    description: A sequence of characters used to identify, name, or characterize
