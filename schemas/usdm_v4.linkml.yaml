        range: PersonName
        required: true
        multivalued: false
        inlined: true
        exact_mappings:
        - ncit:C216993
      jobTitle:
        title: Assigned Person Job Title
        description: An identifying designation related to the assigned person's occupation.
        range: string
        required: true
        multivalued: false
        exact_mappings:
        - ncit:C215599
      organizationId:
