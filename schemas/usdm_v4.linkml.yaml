        range: string
        required: true
        multivalued: false
        identifier: true
      standardCode:
        title: Standard Code
        description: A combination of symbols that is used to represent the standard
          code.
        range: Code
        required: true
        multivalued: false
        inlined: true
        exact_mappings:
        - ncit:C215528
      standardCodeAliases:
        title: Standard Code Aliases
        description: Alternative combinations of symbols used to represent aliases
