    class_uri: usdm:AdministrableProductProperty
    exact_mappings:
    - ncit:C215494
    attributes:
      id:
        range: string
        required: true
        multivalued: false
        identifier: true
      name:
        title: Administrable Product Property Name
        description: The literal identifier (i.e., distinctive designation) of the
          administrable product property.
        range: string
        required: true
        multivalued: false
        exact_mappings:
        - ncit:C215582
      type:
        title: Administrable Product Property Type
        description: A characterization or classification of the administrable product
          property.
        range: Code
        required: true
        multivalued: false
        inlined: true
        exact_mappings:
        - ncit:C215585
      text:
        title: Administrable Product Property Text
        description: An instance of structured text that represents the administrable
          product property.
        range: string
        required: true
        multivalued: false
        exact_mappings:
        - ncit:C215583
      quantity:
        title: Administrable Product Property Quantity Value
        description: The numeric value associated with an administrable product property.
        range: Quantity
        required: false
        multivalued: false
        inlined: true
        exact_mappings:
        - ncit:C215584
      extensionAttributes:
        range: ExtensionAttribute
        required: false
        multivalued: true
        inlined: true
  Administration:
    title: Administration
    description: The act of dispensing, applying, or tendering a product, agent, or
      therapy.
    class_uri: usdm:Administration
    exact_mappings:
    - ncit:C25409
    attributes:
      id:
        range: string
        required: true
        multivalued: false
        identifier: true
      name:
        title: Administration Name
        description: The literal identifier (i.e., distinctive designation) for the
          administration of a product, agent, or therapy.
        range: string
        required: true
        multivalued: false
        exact_mappings:
        - ncit:C207465
      label:
        title: Administration Label
        description: The short descriptive designation for the administration of a
          product, agent, or therapy.
        range: string
        required: false
        multivalued: false
        exact_mappings:
        - ncit:C207464
      description:
        title: Administration Description
        description: A narrative representation for the administration of a product,
          agent, or therapy.
        range: string
        required: false
        multivalued: false
        exact_mappings:
        - ncit:C207463
      dose:
        title: Administration Dose
        description: The value representing the amount of an agent given to an individual
          at one time.
        range: Quantity
        required: false
        multivalued: false
        inlined: true
        exact_mappings:
        - ncit:C167190
      frequency:
        title: Dosing Frequency
        description: The number of doses administered per a specific interval.
        range: AliasCode
        required: false
        multivalued: false
        inlined: true
        exact_mappings:
        - ncit:C89081
      route:
        title: Route of Administration
        description: The pathway by which a substance is administered in order to
          reach the site of action in the body.
        range: AliasCode
        required: false
        multivalued: false
        inlined: true
        exact_mappings:
        - ncit:C38114
      duration:
        title: Administration Duration
        description: The amount of time elapsed during the administration of an agent.
        range: Duration
        required: true
        multivalued: false
        inlined: true
        exact_mappings:
        - ncit:C69282
      notes:
        title: Administration Notes
        description: A brief written record relevant to the administration of the
          product, agent, or therapy.
        range: CommentAnnotation
        required: false
        multivalued: true
        inlined: true
        exact_mappings:
        - ncit:C215544
      administrableProductId:
        description: A USDM relationship between the Administration and AdministrableProductDefinition
          classes which identifies the administrable product associated with the administration
          of the product, agent, or therapy.
        range: AdministrableProduct
        required: false
        multivalued: false
        inlined: false
      medicalDeviceId:
        description: A USDM relationship between the Administration and MedicalDevice
          classes which identifies the medical device associated with an instance
          of product, agent, or therapy administration.
        range: MedicalDevice
        required: false
        multivalued: false
        inlined: false
      extensionAttributes:
        range: ExtensionAttribute
        required: false
        multivalued: true
        inlined: true
  AliasCode:
    title: Alias Code
