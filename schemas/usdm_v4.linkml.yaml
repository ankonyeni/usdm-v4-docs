        required: false
        multivalued: false
        inlined: false
      extensionAttributes:
        range: ExtensionAttribute
        required: false
        multivalued: true
        inlined: true
  BiomedicalConcept:
    title: Biomedical Concept
    description: A unit of biomedical knowledge created from a unique combination
      of characteristics that include implementation details like variables and terminologies,
