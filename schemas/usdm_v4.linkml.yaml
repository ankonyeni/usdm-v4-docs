      research information.
    class_uri: usdm:BiomedicalConcept
    exact_mappings:
    - ncit:C201345
    attributes:
      id:
        range: string
        required: true
        multivalued: false
        identifier: true
      name:
        title: Biomedical Concept Name
        description: The literal identifier (i.e., distinctive designation) of the
          biomedical concept.
        range: string
        required: true
        multivalued: false
        exact_mappings:
        - ncit:C201312
      label:
        title: Biomedical Concept Label
        description: The short descriptive designation for the biomedical concept.
        range: string
        required: false
        multivalued: false
        exact_mappings:
        - ncit:C207470
      synonyms:
        title: Biomedical Concept Synonym
        description: A word or an expression that serves as a figurative, symbolic,
          or exact substitute for a biomedical concept, and which has the same meaning.
        range: string
        required: false
        multivalued: true
        exact_mappings:
        - ncit:C201314
      reference:
        title: Biomedical Concept Reference
        description: A citation to an authoritative source for a biomedical concept.
        range: string
        required: true
        multivalued: false
        exact_mappings:
        - ncit:C201313
      code:
