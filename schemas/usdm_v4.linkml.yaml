    class_uri: usdm:AdministrableProductIdentifier
    is_a: Identifier
    exact_mappings:
    - ncit:C215493
    attributes:
      extensionAttributes:
        range: ExtensionAttribute
        required: false
        multivalued: true
        inlined: true
  AdministrableProductProperty:
    title: Administrable Product Property
    description: A characteristic from a set of characteristics used to define an
